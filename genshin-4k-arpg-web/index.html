<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>4K ARPG Demo</title>
    <link rel="preconnect" href="https://cdn.babylonjs.com" />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <canvas id="renderCanvas"></canvas>

    <div class="hud">
      <div class="logo">ARPG 4K</div>
      <div class="stats"><span id="fps">0</span> FPS | <span id="resLabel">-</span></div>
      <div class="controls">
        <button id="btnMax">Max Settings</button>
        <button id="btnBalanced">Balanced</button>
        <button id="btnPerformance">Performance</button>
        <button id="btnToggleHDR">Toggle HDR</button>
      </div>
    </div>

    <div class="bars">
      <div class="bar stamina"><div id="staminaFill" class="fill"></div></div>
      <div class="bar energy"><div id="energyFill" class="fill"></div></div>
      <div class="lockon">Lock: <span id="lockLabel">None</span></div>
    </div>

    <div class="party">
      <div class="party-slot" data-index="0">1</div>
      <div class="party-slot" data-index="1">2</div>
      <div class="party-slot" data-index="2">3</div>
      <div class="party-slot" data-index="3">4</div>
    </div>

    <div class="skills">
      <div class="skill" title="Normal Attack (LMB)">LMB</div>
      <button id="btnSkillE" class="skill" title="Elemental Skill (E)">E <span id="cdE">0</span></button>
      <button id="btnBurstQ" class="skill" title="Elemental Burst (Q)">Q <span id="cdQ">0</span></button>
    </div>

    <div class="help">W/A/S/D: Move • Shift: Sprint • Mouse: Look • LMB: Attack • E: Skill • Q: Burst • Space: Jump/Dash • Tab: Lock‑on • 1‑4: Switch</div>

    <!-- Babylon.js CDN -->
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>
    <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
    <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>

    <!-- Game code -->
    <script src="./src/main.js"></script>
  </body>
</html>
